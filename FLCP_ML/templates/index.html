<!DOCTYPE html>
<html>
<head>
    <title>Lung Cancer Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">Lung Cancer Prediction</h2>

        <form action="/predict" method="post">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Age</label>
                    <input name="f1" type="number" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Gender</label>
                    <select name="f2" class="form-control">
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select>
                </div>

                <!-- YES/NO FIELDS -->

                <div class="col-md-6 mb-3">
                    <label>Smoking</label>
                    <select name="f3" class="form-control"><option value="1">Yes</option><option value="0">No</option></select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Finger Discoloration</label>
                    <select name="f4" class="form-control"><option value="1">Yes</option><option value="0">No</option></select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Mental Stress</label>
                    <select name="f5" class="form-control"><option value="1">Yes</option><option value="0">No</option></select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Pollution Exposure</label>
                    <select name="f6" class="form-control"><option value="1">Yes</option><option value="0">No</option></select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Long Term Illness</label>
                    <select name="f7" class="form-control"><option value="1">Yes</option><option value="0">No</option></select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Energy Level</label>
                    <input name="f8" type="number" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Immune Weakness</label>
                    <select name="f9" class="form-control"><option value="1">Yes</option><option value="0">No</option></select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Breathing Issue</label>
                    <select name="f10" class="form-control"><option value="1">Yes</option><option value="0">No</option></select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Alcohol Consumption</label>
                    <select name="f11" class="form-control"><option value="1">Yes</option><option value="0">No</option></select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Throat Discomfort</label>
                    <select name="f12" class="form-control"><option value="1">Yes</option><option value="0">No</option></select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Oxygen Saturation</label>
                    <input name="f13" type="number" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Chest Tightness</label>
                    <select name="f14" class="form-control"><option value="1">Yes</option><option value="0">No</option></select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Family History</label>
                    <select name="f15" class="form-control"><option value="1">Yes</option><option value="0">No</option></select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Smoking Family History</label>
                    <select name="f16" class="form-control"><option value="1">Yes</option><option value="0">No</option></select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Stress Immune</label>
                    <select name="f17" class="form-control"><option value="1">Yes</option><option value="0">No</option></select>
                </div>

            </div>

            <button class="btn btn-primary w-100">Predict</button>
        </form>

        {% if knn is defined %}
        <hr>

        <h4 class="text-center">Results</h4>

        <table class="table table-bordered mt-3 text-center">
            <thead class="table-dark">
                <tr>
                    <th>Model</th>
                    <th>Prediction</th>
                    <th>Accuracy</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>KNN</td>
                    <td>{{knn}}</td>
                    <td>{{knn_acc}}%</td>
                </tr>
                <tr>
                    <td>Decision Tree</td>
                    <td>{{dt}}</td>
                    <td>{{dt_acc}}%</td>
                </tr>
                <tr>
                    <td>Random Forest</td>
                    <td>{{rf}}</td>
                    <td>{{rf_acc}}%</td>
                </tr>
            </tbody>
        </table>

        <div class="alert alert-success text-center">
            <h4>Final Prediction: {{final}}</h4>
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
