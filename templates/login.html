<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <style>
        :root {
            --bg: #f5efe6;
            --card: rgba(255, 255, 255, 0.92);
            --ink: #233443;
            --muted: #6f7d87;
            --accent: #bb5a36;
            --accent-dark: #8d3c20;
            --line: #dccfc0;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at left top, rgba(187, 90, 54, 0.18), transparent 35%),
                radial-gradient(circle at right bottom, rgba(35, 52, 67, 0.12), transparent 32%),
                linear-gradient(180deg, #fbf7f2, var(--bg));
        }

        .card {
            width: min(460px, 100%);
            padding: 34px;
            border-radius: 28px;
            background: var(--card);
            box-shadow: 0 20px 44px rgba(35, 52, 67, 0.14);
        }

        h1 {
            margin: 0 0 12px;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 2rem;
        }

        p,
        .footer {
            color: var(--muted);
            line-height: 1.6;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        label {
            font-weight: 700;
        }

        input {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            border: none;
            border-radius: 16px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 800;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            cursor: pointer;
        }

        .error {
            margin-bottom: 16px;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid #f3c4b4;
            background: #fff1ed;
            color: #8c3519;
        }

        .footer {
            margin-top: 18px;
            text-align: center;
        }

        a {
            color: var(--accent-dark);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Sign In</h1>
        <p>Access the unified lung cancer prediction dashboard with your saved history and model comparison results.</p>

        {% if error_message %}
        <div class="error">{{ error_message }}</div>
        {% endif %}

        <form method="post" action="{{ url_for('login') }}">
            <div class="field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required>
            </div>
            <button type="submit">Login</button>
        </form>

        <div class="footer">
            Need an account? <a href="{{ url_for('signup') }}">Create one</a>
        </div>
    </div>
</body>
</html>
